git:
  branchLogCmd: >-
    git log --no-show-signature --graph --color=always --abbrev-commit --decorate --date=relative
    --pretty=format:'%C(auto)%h %s %C(green)(%cr) %C(blue)<%an>%Creset' {{branchName}} --
  allBranchesLogCmds:
    - >-
      git log --no-show-signature --graph --all --color=always --abbrev-commit --decorate
      --date=relative --pretty=format:'%C(auto)%h %s %C(green)(%cr) %C(blue)<%an>%Creset'
  pagers:
    - pager: >-
        delta --paging=never --hyperlinks
        --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"

gui:
  showIcons: true
  theme:
    activeBorderColor:
      - '#8bd5ca'
      - bold
    inactiveBorderColor:
      - '#a5adcb'
    optionsTextColor:
      - '#8aadf4'
    selectedLineBgColor:
      - '#363a4f'
    cherryPickedCommitBgColor:
      - '#494d64'
    cherryPickedCommitFgColor:
      - '#8bd5ca'
    unstagedChangesColor:
      - '#ed8796'
    defaultFgColor:
      - '#cad3f5'
    searchingActiveBorderColor:
      - '#eed49f'
  authorColors:
    '*': '#b7bdf8'

customCommands:
  - key: 'G'
    context: 'commits,subCommits,reflogCommits'
    command: >-
      git show --show-signature --no-patch {{.SelectedLocalCommit.Hash}}
    description: 'Show signature details'
    output: popup
    outputTitle: 'Commit signature details'
  - key: 'K'
    context: 'commits,subCommits,reflogCommits'
    command: >-
      sh -c 'status=$(git log -1 --pretty=format:%G? {{.SelectedLocalCommit.Hash}});
      case "$status" in
        G) label="G (signed)" ;;
        N) label="N (no signature)" ;;
        B) label="B (bad signature)" ;;
        U) label="U (unknown trust)" ;;
        E) label="E (cannot verify)" ;;
        X) label="X (signature expired)" ;;
        Y) label="Y (signing key expired)" ;;
        R) label="R (key revoked)" ;;
        *) label="$status (unknown status)" ;;
      esac;
      git log -1 --pretty=format:"commit %H%nstatus: $label%nsigner: %GS%nauthor: %an <%ae>%n%n%s" {{.SelectedLocalCommit.Hash}}'
    description: 'Show compact signature status'
    output: popup
    outputTitle: 'Commit signature status'

os:
  editInTerminal: false
  # 'edit' is used when you press 'e' on a file
  edit: |-
    set -l lazygit_tab "main"
    set -l target (string replace -r ':$' '' -- "{{filename}}")

    if zellij action dump-layout 2>/dev/null | grep -q 'tab name="editor"'
      set lazygit_tab "editor"
    end

    zellij action go-to-tab-name "$lazygit_tab"
    sleep 0.1

    if not zellij action dump-layout 2>/dev/null | grep -q "tab name=\"$lazygit_tab\".*hide_floating_panes=true"
      zellij action toggle-floating-panes
      sleep 0.1
    end

    zellij action write 27
    zellij action write-chars ":open $target"
    zellij action write 13

  # 'editAtLine' is used when you press 'e' inside a diff/hunk
  editAtLine: |-
    set -l lazygit_tab "main"

    if zellij action dump-layout 2>/dev/null | grep -q 'tab name="editor"'
      set lazygit_tab "editor"
    end

    zellij action go-to-tab-name "$lazygit_tab"
    sleep 0.1

    if not zellij action dump-layout 2>/dev/null | grep -q "tab name=\"$lazygit_tab\".*hide_floating_panes=true"
      zellij action toggle-floating-panes
      sleep 0.1
    end

    zellij action write 27
    zellij action write-chars ":open {{filename}}:{{line}}"
    zellij action write 13

  # 'open' is used for non-text files (images, pdfs, etc)
  open: xdg-open {{filename}} >/dev/null 2>&1 &
